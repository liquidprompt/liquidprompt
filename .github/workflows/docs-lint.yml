name: Lint Documentation
on:
  push:
    paths:
      - 'docs/**'
  pull_request:
jobs:
  docs-lint:
    name: Lint Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Lint
        run: |
          cd docs/
          python3 -m pip install -r requirements.txt
          ./docs-lint.sh
