name: tests
on:
  push:
    paths-ignore:
      - 'docs/**'
  pull_request:
jobs:
  tests:
    strategy:
      matrix:
        shell:
        - bash:3.2
        - bash:4.0
        - bash:4.1
        - bash:4.2
        - bash:4.3
        - bash:4.4
        - bash:5.0
        - bash:5.1
        - bash:5.2
        - bash:5.3
        - zsh:5.0.8
        - zsh:5.1
        - zsh:5.2
        - zsh:5.3
        - zsh:5.4
        - zsh:5.5
        - zsh:5.6
        - zsh:5.7
        - zsh:5.8
        - zsh:5.9
    runs-on: ubuntu-latest
    container:
      image: ${{ format('{0}/{1}', startsWith(matrix.shell, 'bash') && 'docker.io/library' || 'ghcr.io/zsh-users', matrix.shell) }}
    env:
      SHELL: ${{ startsWith(matrix.shell, 'bash') && 'bash' || 'zsh' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Install Alpine packages
        if: env.SHELL == 'bash'
        run: |
          set -x
          apk add ncurses ca-certificates curl git
      - name: Install Debian packages
        if: env.SHELL == 'zsh'
        run: |
          set -x

          # Fix old image versions still pointing at non-archive repo URL.
          # Can be removed once the Zsh images are updated.
          # https://github.com/zsh-users/zsh-docker/issues/34#issuecomment-3308907133
          . /etc/os-release
          if [ "${VERSION_ID-}" = "10" ]; then
            printf 'deb http://archive.debian.org/debian buster main\ndeb http://archive.debian.org/debian buster-updates main\n' > /etc/apt/sources.list
          fi

          install_packages ncurses-bin ca-certificates curl git
      - run: ./tests.sh ${{ env.SHELL }}
